<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/skater white.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <title>Michael Rubin</title>
    <link rel="preload" href="/nightsky.jpg" as="image" fetchpriority="high" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Restore path encoded by 404.html for GitHub Pages SPA routing
      (function () {
        var params = new URLSearchParams(window.location.search);
        var p = params.get('p');
        if (p) {
          var h = params.get('h') || '';
          params.delete('p');
          params.delete('h');
          var qs = params.toString();
          window.history.replaceState(
            null, null,
            decodeURIComponent(p) + (qs ? '?' + qs : '') + decodeURIComponent(h)
          );
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
